<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSIA — System Health</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root{
  --bg:#07080F;--sf:#0B0D1A;--cd:#0F1220;--cd2:#131628;
  --br:rgba(255,255,255,0.065);--br2:rgba(255,255,255,0.11);--br3:rgba(255,255,255,0.18);
  --t1:#ECF0FB;--t2:#576079;--t3:#272F48;
  --gn:#0DC98A;--gnd:rgba(13,201,138,0.09);--gnb:rgba(13,201,138,0.22);
  --am:#F5A623;--amd:rgba(245,166,35,0.09);--amb:rgba(245,166,35,0.22);
  --rd:#F04760;--rdd:rgba(240,71,96,0.09);--rdb:rgba(240,71,96,0.22);
  --pu:#8B5CF6;--pud:rgba(139,92,246,0.1);--pub:rgba(139,92,246,0.25);
  --bl:#4B8FF5;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:var(--bg);color:var(--t1);font-size:14px}
button,input,select{font-family:inherit;font-size:inherit;cursor:pointer}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pglow{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 12px var(--pu)}}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:var(--br2);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gn);cursor:pointer;transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
input[type=range]:disabled{opacity:.35}
select{-webkit-appearance:none;appearance:none}
</style>
</head>
<body><div id="root"></div>
<script>
'use strict';
const {useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;

const api={
  get:path=>fetch(path).then(r=>r.json()).catch(()=>null),
  post:(path,body,tok)=>{
    const hdr={'Content-Type':'application/json'};
    if(tok)hdr['Authorization']='Bearer '+tok;
    return fetch(path,{method:'POST',headers:hdr,body:JSON.stringify(body)}).then(r=>r.json()).catch(e=>({__err:e.message}));
  }
};

const LS={
  get:(k,fb=[])=>{try{return JSON.parse(localStorage.getItem(k)||'null')||fb}catch{return fb}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

const nameFor=id=>{
  if(!id)return'Service';
  const l=id.toLowerCase();
  if(/db|database|postgres|mysql|mongo|dynamo|sqlite/.test(l))return'Database';
  if(/auth|login|session|identity|oauth|iam/.test(l))return'Auth Service';
  if(/gateway|proxy|nginx|ingress|lb|loadbal/.test(l))return'API Gateway';
  if(/cache|redis|memcache|elasticache/.test(l))return'Cache';
  if(/queue|kafka|rabbit|sqs|worker|pubsub/.test(l))return'Message Queue';
  if(/storage|s3|blob|cdn|media|static/.test(l))return'Storage';
  return id.replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
};

const iconFor=n=>{
  if(n.includes('Database'))return'🗄️';
  if(n.includes('Auth'))return'🔐';
  if(n.includes('Gateway'))return'🌐';
  if(n.includes('Cache'))return'⚡';
  if(n.includes('Queue'))return'📬';
  if(n.includes('Storage'))return'📁';
  return'⚙️';
};

const status=rho=>{
  if(!isFinite(rho)||rho>=1.05)return{label:'Overloaded',c:'var(--rd)',d:'var(--rdd)',b:'var(--rdb)'};
  if(rho>=0.85)return{label:'Under pressure',c:'var(--am)',d:'var(--amd)',b:'var(--amb)'};
  if(rho>=0.5)return{label:'Moderate',c:'var(--am)',d:'rgba(245,166,35,0.06)',b:'rgba(245,166,35,0.14)'};
  return{label:'Healthy',c:'var(--gn)',d:'var(--gnd)',b:'var(--gnb)'};
};

const ago=iso=>{
  const s=(Date.now()-new Date(iso))/1000;
  if(s<60)return'just now';
  if(s<3600)return Math.round(s/60)+'m ago';
  if(s<86400)return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
};

const storyFor=(data,name)=>{
  const state=data.safety?.confidence_state||'UNKNOWN';
  const score=data.safety?.confidence_score||0;
  const risk=data.safety?.latent_risk||'HIGH';
  const root=data.root_cause;
  const rootName=root?nameFor(root):name;
  const causes=Object.keys(data.causes||{}).filter(k=>k!==root).map(nameFor);
  const execMs=data.execution_time_ms||0;
  const src=data.data_source||'synthetic';

  let verdict,c,d,b,headline,body,actions;
  const pct=Math.round(score*100);

  if(state==='CONFIRMED'){
    verdict='confirmed';c='var(--gn)';d='var(--gnd)';b='var(--gnb)';
    headline='Root cause found';
    body=`We're ${pct}% confident the issue is in your ${rootName}. `
      +(causes.length?`The problem is cascading into ${causes.join(' and ')}.`:'No other services appear to be affected yet.')
      +' Fixing this service directly should resolve the slowdowns users are experiencing.';
    actions=[
      {t:`Scale up your ${rootName}`,d:'Add more server capacity to handle the load. This is the fastest path to resolution.',e:'Fast fix',hi:true},
      {t:'Review recent changes',d:'A deployment or traffic spike may have triggered this. Check your change log from the last 24 hours.',e:'~15 min',hi:false},
      {t:'Enable request throttling',d:'Temporarily limit incoming traffic to stop the backlog growing while you scale.',e:'~5 min',hi:false},
    ];
  }else if(state==='PROBABLE'){
    verdict='probable';c='var(--am)';d='var(--amd)';b='var(--amb)';
    headline='Likely issue identified';
    body=`We have a strong lead — ${pct}% confident your ${rootName} is the source. `
      +(causes.length?`${causes.join(', ')} may also be affected.`:'No clear downstream impact yet.')
      +' Gather a bit more data to confirm before making changes.';
    actions=[
      {t:'Collect more monitoring data',d:'Run a few more diagnostics over 10–15 minutes to raise confidence before acting.',e:'Recommended',hi:false},
      {t:`Inspect ${rootName} logs`,d:'Look for errors, slow queries, or high memory that confirm the bottleneck.',e:'~10 min',hi:false},
      {t:'Prepare a scaling plan',d:'Have a runbook ready so you can scale quickly once the diagnosis is confirmed.',e:'~20 min',hi:false},
    ];
  }else{
    verdict='unknown';c='var(--rd)';d='var(--rdd)';b='var(--rdb)';
    headline=risk==='HIGH'?'Unusual patterns — manual check needed':'More data required';
    body=risk==='HIGH'
      ?`The system detected unusual patterns but can't pin down the exact cause yet. There may be hidden factors not captured in your current monitoring. ${pct}% confidence — too low to act on automatically. Manual investigation recommended.`
      :`Not enough monitoring samples to make a confident diagnosis. Add data from at least 4 services using the Services tab, then run the diagnosis again.`;
    actions=[
      {t:'Add more service data',d:'More samples across different services improve accuracy significantly. Use the Services tab.',e:'Do this first',hi:true},
      {t:'Check services manually',d:'While the system learns, review logs and metrics for each service yourself.',e:'Manual',hi:false},
      {t:'Escalate if users are impacted',d:'If users are experiencing issues right now, escalate to your on-call team immediately.',e:'If urgent',hi:false},
    ];
  }
  return{verdict,c,d,b,headline,body,actions,rootName,affected:causes,execMs,src,score,state};
};

function Bar({v,color,h:ht=3}){
  return h('div',{style:{height:ht,background:'var(--br2)',borderRadius:2,overflow:'hidden'}},
    h('div',{style:{height:'100%',width:Math.min(100,Math.max(0,v))+'%',background:color,borderRadius:2,transition:'width .75s cubic-bezier(.4,0,.2,1)'}})
  );
}

function Spinner({sz=12,color='var(--gn)'}){
  return h('div',{style:{width:sz,height:sz,borderRadius:'50%',border:'1.5px solid var(--br2)',borderTopColor:color,animation:'spin .65s linear infinite',flexShrink:0}});
}

function Pill({label,c,d,b,sm}){
  return h('span',{style:{
    fontSize:sm?10:11,fontWeight:500,color:c,
    background:d,border:`1px solid ${b}`,
    padding:sm?'1px 7px':'3px 10px',borderRadius:20,
    display:'inline-block',whiteSpace:'nowrap',
  }},label);
}

function FieldLabel({children}){
  return h('div',{style:{fontSize:11,color:'var(--t2)',marginBottom:6,letterSpacing:'.01em'}},children);
}

function Input({style:s,...p}){
  const base={
    width:'100%',background:'var(--cd2)',border:'1px solid var(--br)',
    borderRadius:8,color:'var(--t1)',padding:'9px 12px',fontSize:13,outline:'none',
    transition:'border-color .15s',
  };
  return h('input',{
    ...p,
    style:{...base,...s},
    onFocus:e=>{e.target.style.borderColor='var(--br3)';p.onFocus&&p.onFocus(e)},
    onBlur:e=>{e.target.style.borderColor='var(--br)';p.onBlur&&p.onBlur(e)},
  });
}

function Btn({onClick,disabled,loading,danger,secondary,children,style:s}){
  const base={
    width:'100%',padding:'10px 14px',borderRadius:8,border:'none',
    fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8,
    transition:'opacity .15s, transform .1s',
    cursor:disabled||loading?'not-allowed':'pointer',
    opacity:disabled||loading?.5:1,
    ...(secondary
      ?{background:'rgba(255,255,255,0.04)',color:'var(--t2)',border:'1px solid var(--br)'}
      :danger
      ?{background:'var(--rdd)',color:'var(--rd)',border:'1px solid var(--rdb)'}
      :{background:'var(--gn)',color:'#041C14'}),
    ...s,
  };
  return h('button',{
    onClick:disabled||loading?undefined:onClick,
    style:base,
    onMouseEnter:e=>{if(!disabled&&!loading)e.currentTarget.style.opacity='.85'},
    onMouseLeave:e=>{e.currentTarget.style.opacity='1'},
    onMouseDown:e=>{if(!disabled&&!loading)e.currentTarget.style.transform='scale(0.985)'},
    onMouseUp:e=>{e.currentTarget.style.transform='scale(1)'},
  },loading&&h(Spinner,{sz:12,color:secondary?'var(--t2)':'rgba(4,28,20,.5)'}),children);
}

function Alert({msg,type}){
  const map={ok:{c:'var(--gn)',d:'var(--gnd)',b:'var(--gnb)'},err:{c:'var(--rd)',d:'var(--rdd)',b:'var(--rdb)'}};
  const s=map[type]||map.err;
  return h('div',{style:{
    fontSize:12,color:s.c,background:s.d,border:`1px solid ${s.b}`,
    padding:'9px 12px',borderRadius:8,lineHeight:1.5,
  }},msg);
}

function Card({children,style:s,border}){
  return h('div',{style:{background:'var(--cd)',border:`1px solid ${border||'var(--br)'}`,borderRadius:12,padding:18,...s}},children);
}

const PHASES=[
  'Measuring load on each service',
  'Detecting unusual patterns',
  'Tracing the causal chain',
  'Building the explanation',
  'Ranking the best fixes',
];

function PhaseList({active}){
  return h('div',null,
    PHASES.map((lbl,i)=>{
      const done=active>i,run=active===i;
      return h('div',{key:i,style:{
        display:'flex',alignItems:'center',gap:12,padding:'11px 0',
        borderBottom:i<4?'1px solid var(--br)':'none',
      }},
        h('div',{style:{
          width:22,height:22,borderRadius:'50%',flexShrink:0,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:9,fontWeight:700,
          background:done?'var(--gnd)':run?'var(--pud)':'rgba(255,255,255,0.03)',
          border:`1px solid ${done?'var(--gnb)':run?'var(--pub)':'var(--br)'}`,
          color:done?'var(--gn)':run?'var(--pu)':'var(--t3)',
          animation:run?'pglow 1.4s ease-in-out infinite':'none',
        }},done?'✓':run?h(Spinner,{sz:9,color:'var(--pu)'}):i+1),
        h('div',{style:{fontSize:13,color:done?'var(--t1)':run?'var(--pu)':'var(--t2)',fontWeight:run?500:400,transition:'color .2s'}},lbl)
      );
    })
  );
}

function ResultView({r,onAgain}){
  return h('div',{style:{animation:'fu .25s ease'}},
    h(Card,{border:r.b,style:{marginBottom:14}},
      h('div',{style:{display:'flex',alignItems:'flex-start',gap:14,marginBottom:16}},
        h('div',{style:{
          width:40,height:40,borderRadius:'50%',flexShrink:0,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:18,background:r.d,border:`1px solid ${r.b}`,
        }},r.verdict==='confirmed'?'✓':r.verdict==='probable'?'≈':'?'),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontSize:11,color:'var(--t2)',marginBottom:4}},
            `${Math.round(r.score*100)}% confidence · ${r.src} · ${r.execMs}ms`),
          h('div',{style:{fontSize:20,fontWeight:600,color:r.c,lineHeight:1.25}},r.headline)
        )
      ),
      h('div',{style:{background:'rgba(255,255,255,0.025)',borderRadius:10,padding:'12px 14px',fontSize:13,color:'var(--t1)',lineHeight:1.75}},r.body)
    ),

    r.verdict!=='unknown'&&r.affected.length>0&&h(Card,{style:{marginBottom:14}},
      h('div',{style:{fontSize:11,color:'var(--t2)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:14}},
        'How the problem is spreading'),
      h('div',{style:{display:'flex',alignItems:'center',overflowX:'auto',paddingBottom:4,gap:0}},
        [r.rootName,...r.affected].map((name,i,arr)=>
          h(React.Fragment,{key:i},
            h('div',{style:{flexShrink:0,textAlign:'center',minWidth:64}},
              h('div',{style:{
                width:44,height:44,borderRadius:'50%',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:18,margin:'0 auto 6px',
                background:i===0?'var(--rdd)':'var(--gnd)',
                border:`1.5px solid ${i===0?'var(--rdb)':'var(--gnb)'}`,
              }},iconFor(name)),
              h('div',{style:{fontSize:10,color:i===0?'var(--rd)':'var(--t2)',fontWeight:i===0?600:400,lineHeight:1.3}},name),
              i===0&&h('div',{style:{fontSize:9,color:'var(--rd)',marginTop:2}},'root cause')
            ),
            i<arr.length-1&&h('div',{style:{flex:1,height:1,background:'var(--br)',margin:'0 4px',marginBottom:20,minWidth:12}})
          )
        )
      )
    ),

    h(Card,{style:{marginBottom:12}},
      h('div',{style:{fontSize:11,color:'var(--t2)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:14}},'What to do'),
      r.actions.map((a,i)=>
        h('div',{key:i,style:{
          display:'flex',gap:12,padding:'12px 0',
          borderBottom:i<r.actions.length-1?'1px solid var(--br)':'none',
        }},
          h('div',{style:{
            width:22,height:22,borderRadius:'50%',flexShrink:0,marginTop:1,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:10,fontWeight:700,
            background:a.hi?'var(--gnd)':'rgba(255,255,255,0.04)',
            border:`1px solid ${a.hi?'var(--gnb)':'var(--br)'}`,
            color:a.hi?'var(--gn)':'var(--t2)',
          }},i+1),
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:13,fontWeight:500,color:'var(--t1)',marginBottom:3}},a.t),
            h('div',{style:{fontSize:12,color:'var(--t2)',lineHeight:1.65}},a.d)
          ),
          h('span',{style:{fontSize:10,color:a.hi?'var(--gn)':'var(--t2)',alignSelf:'center',flexShrink:0,whiteSpace:'nowrap'}},a.e)
        )
      )
    ),
    h(Btn,{onClick:onAgain,secondary:true},'Run diagnosis again')
  );
}

function OverviewTab({health,services,onTab}){
  const bad=services.filter(s=>{const r=s.cap>0?s.req/s.cap:Infinity;return r>=0.85});
  const crit=bad.filter(s=>s.cap>0?s.req/s.cap>=1:true);
  const ok=bad.length===0;
  const bc=crit.length?'var(--rd)':bad.length?'var(--am)':'var(--gn)';
  const bd=crit.length?'var(--rdd)':bad.length?'var(--amd)':'var(--gnd)';
  const bb=crit.length?'var(--rdb)':bad.length?'var(--amb)':'var(--gnb)';
  const bi=crit.length?'🔴':bad.length?'🟡':'✅';
  const bt=ok?'All systems healthy':crit.length?`${crit.length} service${crit.length>1?'s':''} overloaded`:`${bad.length} service${bad.length>1?'s':''} under pressure`;
  const bm=ok?'Everything is running within normal limits.'
    :crit.length?`${crit.length} service${crit.length>1?'s are':' is'} receiving more traffic than they can handle. Action needed.`
    :`${bad.length} service${bad.length>1?'s are':' is'} running hot. Monitor closely.`;

  return h('div',{style:{height:'100%',overflowY:'auto',padding:20,display:'flex',flexDirection:'column',gap:14}},
    h('div',{style:{
      padding:'16px 18px',borderRadius:12,
      background:bd,border:`1px solid ${bb}`,
      display:'flex',alignItems:'center',gap:12,flexShrink:0,
    }},
      h('span',{style:{fontSize:26,flexShrink:0}},bi),
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:15,fontWeight:600,color:'var(--t1)',marginBottom:3}},bt),
        h('div',{style:{fontSize:12,color:'var(--t2)',lineHeight:1.5}},bm)
      ),
      !ok&&h(Btn,{
        onClick:()=>onTab('diagnose'),
        style:{width:'auto',padding:'7px 16px',background:bc,color:crit.length?'#fff':'#1a0f00',flexShrink:0},
      },'Diagnose now')
    ),

    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,flexShrink:0}},
      [
        {label:'Services monitored',val:services.length||health?.ingested_node_count||'—',
          sub:services.length?`${services.length-bad.length} healthy, ${bad.length} need attention`:'No services added yet',
          c:services.length?'var(--t1)':undefined},
        {label:'Analysis status',
          val:health?.real_data_available?'Ready':'Needs data',
          sub:health?.real_data_available?'Diagnosis will use real data':'Add 4+ service samples first',
          c:health?.real_data_available?'var(--gn)':'var(--am)'},
        {label:'Server status',
          val:health?.status==='ok'?'Online':health?'Degraded':'Checking…',
          sub:health?.version?`Version ${health.version}`:' ',
          c:health?.status==='ok'?'var(--gn)':health?'var(--rd)':'var(--t2)'},
      ].map(({label,val,sub,c})=>
        h(Card,{key:label},
          h('div',{style:{fontSize:11,color:'var(--t2)',marginBottom:8}},label),
          h('div',{style:{fontSize:24,fontWeight:600,color:c||'var(--t1)',lineHeight:1,marginBottom:4}},val),
          h('div',{style:{fontSize:11,color:'var(--t3)'}},sub)
        )
      )
    ),

    services.length===0
      ?h('div',{style:{
          flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          gap:8,textAlign:'center',padding:24,
        }},
        h('div',{style:{fontSize:40,marginBottom:6}},'📡'),
        h('div',{style:{fontSize:16,fontWeight:600,color:'var(--t1)',marginBottom:6}},'No services connected'),
        h('div',{style:{fontSize:13,color:'var(--t2)',maxWidth:300,lineHeight:1.7,marginBottom:16}},
          'Add your services in the Services tab. Once you have monitoring data, ABSIA will automatically trace the root cause of any slowdown.'),
        h(Btn,{onClick:()=>onTab('services'),style:{width:'auto',padding:'9px 20px'}},'Add your first service →')
      )
      :h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
          services.map(svc=>{
            const rho=svc.cap>0?svc.req/svc.cap:Infinity;
            const pct=Math.min(200,Math.round(rho*100));
            const st=status(rho);
            return h(Card,{key:svc.id},
              h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
                h('span',{style:{fontSize:22,flexShrink:0}},iconFor(svc.name)),
                h('div',{style:{flex:1,minWidth:0}},
                  h('div',{style:{fontSize:14,fontWeight:500,color:'var(--t1)',marginBottom:2}},svc.name),
                  h('div',{style:{fontSize:11,color:'var(--t2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},svc.id)
                ),
                h(Pill,{label:st.label,c:st.c,d:st.d,b:st.b})
              ),
              h(Bar,{v:pct,color:st.c}),
              h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:11,color:'var(--t2)'}},
                h('span',null,`${svc.req} of ${svc.cap} req/s`),
                h('span',{style:{color:pct>=100?'var(--rd)':pct>=85?'var(--am)':'var(--t2)'}},
                  svc.q>0?`${svc.q} waiting`:`${pct}% capacity`)
              )
            );
          })
        )
  );
}

function ServicesTab({services,setServices}){
  const [form,setForm]=useState({id:'',name:'',req:50,cap:100,q:0});
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [loading,setLoading]=useState(false);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const rho=form.cap>0?form.req/form.cap:Infinity;
  const pct=Math.min(200,Math.round(rho*100));
  const st=status(rho);

  async function add(){
    if(!form.id.trim()){setErr('Please enter a service ID.');return}
    if(form.cap<=0){setErr('Capacity must be greater than 0.');return}
    setErr('');setOk('');setLoading(true);
    const res=await api.post('/ingest',{node_id:form.id.trim(),arrival_rate:form.req,service_rate:form.cap,queue_length:form.q});
    setLoading(false);
    if(res&&!res.__err&&res.success!==false){
      const svc={id:form.id.trim(),name:form.name.trim()||nameFor(form.id.trim()),req:form.req,cap:form.cap,q:form.q,at:new Date().toISOString()};
      const next=[...services.filter(s=>s.id!==svc.id),svc];
      setServices(next);LS.set('absia_svcs',next);
      setOk(`${svc.name} added successfully.`);
      setTimeout(()=>setOk(''),4000);
      sf('id','');sf('name','');
    }else{
      setErr(res?.__err||res?.errors?.[0]||'Could not reach the server. Make sure it is running.');
    }
  }

  function remove(id){
    const next=services.filter(s=>s.id!==id);
    setServices(next);LS.set('absia_svcs',next);
  }

  return h('div',{style:{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{style:{padding:20,borderBottom:'1px solid var(--br)',flexShrink:0,overflowY:'auto'}},
      h('div',{style:{fontSize:11,color:'var(--t2)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:14}},
        'Connect a service'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}},
        h('div',null,
          h(FieldLabel,null,'Service ID'),
          h(Input,{value:form.id,placeholder:'e.g. db-primary, auth-svc',onChange:e=>sf('id',e.target.value)})
        ),
        h('div',null,
          h(FieldLabel,null,'Display name (optional)'),
          h(Input,{value:form.name,placeholder:form.id?nameFor(form.id):'Auto-detected',onChange:e=>sf('name',e.target.value)})
        )
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
        ...[
          {label:'Requests per second',key:'req',max:2000},
          {label:'Max capacity (req/s)',key:'cap',max:2000},
        ].map(({label,key,max})=>
          h('div',{key},
            h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--t2)',marginBottom:8}},
              h('span',null,label),
              h('span',{style:{color:'var(--t1)',fontWeight:500}},form[key])
            ),
            h('input',{type:'range',min:1,max,step:1,value:form[key],onChange:e=>sf(key,+e.target.value)})
          )
        )
      ),
      h('div',{style:{marginBottom:12}},
        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--t2)',marginBottom:8}},
          h('span',null,'Requests waiting in queue'),
          h('span',{style:{color:form.q>100?'var(--am)':'var(--t1)',fontWeight:500}},form.q)
        ),
        h('input',{type:'range',min:0,max:2000,step:1,value:form.q,onChange:e=>sf('q',+e.target.value)})
      ),
      h('div',{style:{
        padding:'10px 12px',borderRadius:8,marginBottom:12,
        background:st.d,border:`1px solid ${st.b}`,
        display:'flex',justifyContent:'space-between',alignItems:'center',
      }},
        h('div',{style:{fontSize:12}},
          h('span',{style:{color:st.c,fontWeight:600}},st.label),
          h('span',{style:{color:'var(--t2)'}},` — ${pct}% of capacity used`)
        ),
        form.q>0&&h('span',{style:{fontSize:11,color:pct>=100?'var(--rd)':'var(--t2)'}},`${form.q} waiting`)
      ),
      err&&h('div',{style:{marginBottom:10}},h(Alert,{msg:err,type:'err'})),
      ok&&h('div',{style:{marginBottom:10}},h(Alert,{msg:'✓ '+ok,type:'ok'})),
      h(Btn,{onClick:add,loading},'Add service')
    ),
    h('div',{style:{flex:1,overflowY:'auto',padding:20}},
      services.length===0
        ?h('div',{style:{textAlign:'center',padding:'32px 20px',color:'var(--t2)'}},
          h('div',{style:{fontSize:32,marginBottom:8}},'📋'),
          h('div',{style:{fontSize:13}},'No services yet.')
        )
        :h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          h('div',{style:{fontSize:11,color:'var(--t2)',marginBottom:4}},`${services.length} connected`),
          ...services.map(svc=>{
            const rho=svc.cap>0?svc.req/svc.cap:Infinity;
            const st=status(rho);
            return h('div',{key:svc.id,style:{
              background:'var(--cd)',border:'1px solid var(--br)',borderRadius:10,
              padding:'12px 14px',display:'flex',alignItems:'center',gap:12,
            }},
              h('span',{style:{fontSize:20,flexShrink:0}},iconFor(svc.name)),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{fontSize:13,fontWeight:500,color:'var(--t1)',marginBottom:2}},svc.name),
                h('div',{style:{fontSize:11,color:'var(--t2)'}},
                  `${svc.req}/${svc.cap} req/s · ${svc.q} waiting · Added ${ago(svc.at)}`)
              ),
              h(Pill,{label:st.label,c:st.c,d:st.d,b:st.b,sm:true}),
              h('button',{
                onClick:()=>remove(svc.id),
                style:{background:'none',border:'none',color:'var(--t3)',fontSize:18,padding:'0 4px',cursor:'pointer',transition:'color .15s',flexShrink:0,lineHeight:1},
                onMouseEnter:e=>e.target.style.color='var(--rd)',
                onMouseLeave:e=>e.target.style.color='var(--t3)',
              },'×')
            );
          })
        )
    )
  );
}

function DiagnoseTab({services,apiKey,addHistory}){
  const [sel,setSel]=useState('');
  const [req,setReq]=useState(50);
  const [cap,setCap]=useState(80);
  const [q,setQ]=useState(10);
  const [phase,setPhase]=useState(-1);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const timer=useRef(null);

  useEffect(()=>{
    if(sel){const s=services.find(x=>x.id===sel);if(s){setReq(s.req);setCap(s.cap);setQ(s.q)}}
    else{setReq(50);setCap(80);setQ(10)}
  },[sel,services]);

  useEffect(()=>()=>clearInterval(timer.current),[]);

  const rho=cap>0?req/cap:Infinity;
  const pct=Math.min(200,Math.round(rho*100));
  const st=status(rho);
  const displayName=sel?services.find(s=>s.id===sel)?.name||nameFor(sel):'this service';

  async function run(){
    if(busy)return;
    setErr('');setResult(null);setBusy(true);
    let p=0;setPhase(0);
    timer.current=setInterval(()=>{p=Math.min(p+1,3);setPhase(p)},400);
    const body={arrival_rate:req,service_rate:cap,queue_length:q};
    if(sel)body.node_id=sel;
    const data=await api.post('/analyze',body,apiKey);
    clearInterval(timer.current);
    setPhase(4);
    await new Promise(r=>setTimeout(r,200));
    setBusy(false);
    if(!data||data.__err){
      setErr(data?.__err||'Could not reach the server.');
      setPhase(-1);return;
    }
    const story=storyFor(data,displayName);
    setResult(story);
    addHistory({...story,time:new Date().toISOString()});
    setPhase(-1);
  }

  if(result)return h('div',{style:{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{style:{flex:1,overflowY:'auto',padding:20}},
      h(ResultView,{r:result,onAgain:()=>{setResult(null);setPhase(-1)}})
    )
  );

  return h('div',{style:{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{style:{padding:20,borderBottom:'1px solid var(--br)',flexShrink:0,overflowY:'auto'}},
      h('div',{style:{fontSize:11,color:'var(--t2)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:14}},
        'Select a service'),
      services.length>0&&h('div',{style:{marginBottom:14}},
        h(FieldLabel,null,'Service to diagnose'),
        h('select',{
          value:sel,onChange:e=>setSel(e.target.value),disabled:busy,
          style:{
            width:'100%',background:'var(--cd2)',border:'1px solid var(--br)',
            borderRadius:8,color:sel?'var(--t1)':'var(--t2)',
            padding:'9px 12px',fontSize:13,outline:'none',
          },
        },
          h('option',{value:''},'— Or enter values manually below —'),
          ...services.map(s=>h('option',{key:s.id,value:s.id},`${iconFor(s.name)} ${s.name}`))
        )
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
        ...[
          {label:'Requests per second',val:req,set:setReq,max:2000},
          {label:'Max capacity',val:cap,set:setCap,max:2000},
        ].map(({label,val,set,max})=>
          h('div',{key:label},
            h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--t2)',marginBottom:8}},
              h('span',null,label),
              h('span',{style:{color:'var(--t1)',fontWeight:500}},val)
            ),
            h('input',{type:'range',min:1,max,step:1,value:val,disabled:busy||(!!sel),onChange:e=>set(+e.target.value)})
          )
        )
      ),
      h('div',{style:{marginBottom:12}},
        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--t2)',marginBottom:8}},
          h('span',null,'Waiting in queue'),
          h('span',{style:{color:q>100?'var(--am)':'var(--t1)',fontWeight:500}},q)
        ),
        h('input',{type:'range',min:0,max:2000,step:1,value:q,disabled:busy||(!!sel),onChange:e=>setQ(+e.target.value)})
      ),
      h('div',{style:{
        padding:'10px 12px',borderRadius:8,marginBottom:12,
        background:st.d,border:`1px solid ${st.b}`,
        display:'flex',justifyContent:'space-between',alignItems:'center',
      }},
        h('div',{style:{fontSize:12}},
          h('span',{style:{color:st.c,fontWeight:600}},st.label),
          h('span',{style:{color:'var(--t2)'}},` — ${pct}% of capacity`)
        ),
        q>0&&h('span',{style:{fontSize:11,color:pct>=100?'var(--rd)':'var(--t2)'}},`${q} waiting`)
      ),
      err&&h('div',{style:{marginBottom:10}},h(Alert,{msg:err,type:'err'})),
      h(Btn,{onClick:run,loading:busy},'Diagnose this service')
    ),
    h('div',{style:{flex:1,overflowY:'auto',padding:20}},
      phase>=0
        ?h('div',null,
          h('div',{style:{fontSize:14,fontWeight:500,color:'var(--t1)',marginBottom:3}},`Diagnosing ${displayName}…`),
          h('div',{style:{fontSize:12,color:'var(--t2)',marginBottom:16}},'Checking all connected systems — this takes a few seconds.'),
          h(PhaseList,{active:phase})
        )
        :h('div',{style:{
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          height:'100%',gap:6,textAlign:'center',
        }},
          h('div',{style:{fontSize:30,marginBottom:6}},'🔍'),
          h('div',{style:{fontSize:14,fontWeight:500,color:'var(--t1)',marginBottom:4}},'Ready to diagnose'),
          h('div',{style:{fontSize:12,color:'var(--t2)',maxWidth:260,lineHeight:1.65}},
            'Set the values above and click diagnose. Results will be explained in plain English — no technical jargon.')
        )
    )
  );
}

function HistoryTab({history}){
  if(!history.length)return h('div',{style:{
    height:'100%',display:'flex',flexDirection:'column',alignItems:'center',
    justifyContent:'center',gap:6,textAlign:'center',padding:24,color:'var(--t2)',
  }},
    h('div',{style:{fontSize:36,marginBottom:6}},'📋'),
    h('div',{style:{fontSize:14,fontWeight:500,color:'var(--t1)',marginBottom:4}},'No history yet'),
    h('div',{style:{fontSize:12,maxWidth:250,lineHeight:1.65}},
      'Each diagnosis you run will be saved here for reference.')
  );
  return h('div',{style:{height:'100%',overflowY:'auto',padding:20,display:'flex',flexDirection:'column',gap:10}},
    ...history.map((r,i)=>
      h(Card,{key:i},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:8}},
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{fontSize:13,fontWeight:500,color:'var(--t1)',marginBottom:2}},
              r.rootName||'Unknown'),
            h('div',{style:{fontSize:11,color:'var(--t2)'}},
              `${ago(r.time)} · ${Math.round(r.score*100)}% confidence · ${r.execMs}ms`)
          ),
          h(Pill,{label:r.headline,c:r.c,d:r.d,b:r.b,sm:true})
        ),
        h('div',{style:{fontSize:12,color:'var(--t2)',lineHeight:1.65}},
          r.body.length>150?r.body.slice(0,150)+'…':r.body)
      )
    )
  );
}

function App(){
  const [tab,setTab]=useState('overview');
  const [health,setHealth]=useState(null);
  const [hErr,setHErr]=useState(false);
  const [services,setServices]=useState(()=>LS.get('absia_svcs',[]));
  const [history,setHistory]=useState(()=>LS.get('absia_hist',[]));
  const [apiKey,setApiKey]=useState('');

  const poll=useCallback(async()=>{
    const d=await api.get('/health');
    if(d&&!d.__err){setHealth(d);setHErr(false)}else setHErr(true);
  },[]);

  useEffect(()=>{poll();const id=setInterval(poll,5000);return()=>clearInterval(id)},[poll]);

  const addHistory=useCallback(item=>{
    setHistory(h=>{const next=[item,...h].slice(0,30);LS.set('absia_hist',next);return next});
  },[]);

  const bad=services.filter(s=>(s.cap>0?s.req/s.cap:Infinity)>=0.85);
  const crit=bad.filter(s=>(s.cap>0?s.req/s.cap:Infinity)>=1.05);

  const TABS=[
    {id:'overview',label:'Overview'},
    {id:'services',label:'Services'},
    {id:'diagnose',label:'Diagnose'},
    {id:'history',label:'History'},
  ];

  return h('div',{style:{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('div',{style:{
      height:46,flexShrink:0,background:'var(--sf)',
      borderBottom:'1px solid var(--br)',
      display:'flex',alignItems:'center',padding:'0 16px',
    }},
      h('div',{style:{
        display:'flex',alignItems:'center',gap:8,
        paddingRight:14,marginRight:6,borderRight:'1px solid var(--br)',
      }},
        h('div',{style:{
          width:24,height:24,borderRadius:7,
          background:'linear-gradient(135deg,var(--gn) 0%,var(--bl) 100%)',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:12,flexShrink:0,
        }},'⚡'),
        h('span',{style:{fontSize:14,fontWeight:600,color:'var(--t1)',letterSpacing:'.01em'}},
          'System Health')
      ),
      h('div',{style:{display:'flex',flex:1}},
        TABS.map(t=>
          h('button',{
            key:t.id,onClick:()=>setTab(t.id),
            style:{
              display:'flex',alignItems:'center',gap:5,
              padding:'0 12px',height:46,
              background:'none',border:'none',
              borderBottom:`2px solid ${tab===t.id?'var(--gn)':'transparent'}`,
              color:tab===t.id?'var(--t1)':'var(--t2)',
              fontSize:12,fontWeight:tab===t.id?500:400,
              cursor:'pointer',transition:'color .15s',
              whiteSpace:'nowrap',position:'relative',
            },
          },
            t.label,
            t.id==='overview'&&(crit.length||bad.length)&&h('span',{style:{
              position:'absolute',top:8,right:6,
              width:5,height:5,borderRadius:'50%',
              background:crit.length?'var(--rd)':'var(--am)',
            }})
          )
        )
      ),
      h('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}},
        h('input',{
          type:'password',value:apiKey,
          onChange:e=>setApiKey(e.target.value),
          placeholder:'API key',
          style:{
            background:'var(--cd)',border:'1px solid var(--br)',borderRadius:6,
            color:'var(--t1)',padding:'5px 10px',fontSize:11,outline:'none',width:100,
            transition:'border-color .15s',
          },
          onFocus:e=>e.target.style.borderColor='var(--br3)',
          onBlur:e=>e.target.style.borderColor='var(--br)',
        }),
        h('div',{style:{
          display:'flex',alignItems:'center',gap:5,fontSize:10,fontWeight:500,
          color:hErr?'var(--rd)':health?'var(--gn)':'var(--t2)',
          background:hErr?'var(--rdd)':health?'var(--gnd)':'rgba(255,255,255,0.04)',
          border:`1px solid ${hErr?'var(--rdb)':health?'var(--gnb)':'var(--br)'}`,
          padding:'4px 10px',borderRadius:20,transition:'all .3s',
          letterSpacing:'.03em',
        }},
          h('div',{style:{
            width:5,height:5,borderRadius:'50%',flexShrink:0,
            background:hErr?'var(--rd)':health?'var(--gn)':'var(--t2)',
            animation:health&&!hErr?'pd 2.2s ease-in-out infinite':'none',
          }}),
          hErr?'Offline':health?'Live':'—'
        )
      )
    ),
    h('div',{style:{flex:1,overflow:'hidden',minHeight:0}},
      tab==='overview'&&h(OverviewTab,{health,services,onTab:setTab}),
      tab==='services'&&h(ServicesTab,{services,setServices}),
      tab==='diagnose'&&h(DiagnoseTab,{services,apiKey,addHistory}),
      tab==='history'&&h(HistoryTab,{history})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
