<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABSIA</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/*  Reset + tokens ─ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #05080D;
  --bg1:       #090D14;
  --bg2:       #0E1520;
  --bg3:       #131C2B;
  --bg4:       #192234;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #E8EFF8;
  --muted:     #7A8FA8;
  --dim:       #44566A;

  --teal:      #00D4AA;
  --teal-dim:  rgba(0,212,170,0.10);
  --teal-bd:   rgba(0,212,170,0.25);

  --amber:     #F59E0B;
  --amber-dim: rgba(245,158,11,0.10);
  --amber-bd:  rgba(245,158,11,0.28);

  --red:       #F05252;
  --red-dim:   rgba(240,82,82,0.10);
  --red-bd:    rgba(240,82,82,0.28);

  --blue:      #60A5FA;
  --blue-dim:  rgba(96,165,250,0.10);
  --blue-bd:   rgba(96,165,250,0.25);

  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/*  Scrollbar ─ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/*  Animations  */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
@keyframes slidein { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
@keyframes dot-pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.6); opacity: 0.6; }
}

/*  Layout shell  */
.shell {
  display: grid;
  grid-template-rows: 56px 1fr;
  min-height: 100vh;
}

/*  Header  */
.header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg1);
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo-mark {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--teal), #0095CC);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 13px;
  color: #000;
  letter-spacing: -0.5px;
}

.logo-text {
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.02em;
  color: var(--text);
}

.logo-tag {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
}

.header-sep { flex: 1; }

.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--muted);
}

.badge.live   { border-color: var(--teal-bd); background: var(--teal-dim); color: var(--teal); }
.badge.warn   { border-color: var(--amber-bd); background: var(--amber-dim); color: var(--amber); }
.badge.dead   { border-color: var(--red-bd); background: var(--red-dim); color: var(--red); }

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--teal);
  animation: dot-pulse 2s ease-in-out infinite;
}

.icon-btn {
  width: 32px; height: 32px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
}
.icon-btn:hover { border-color: var(--teal-bd); color: var(--teal); background: var(--teal-dim); }
.icon-btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/*  Main canvas ─ */
.canvas {
  display: grid;
  grid-template-columns: 340px 1fr 360px;
  overflow: hidden;
  height: calc(100vh - 56px);
}

/*  Shared panel styles ─ */
.col {
  overflow-y: auto;
  height: 100%;
  border-right: 1px solid var(--border);
}
.col:last-child { border-right: 0; }

.col-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}

.col-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.col-sub {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
}

/*  KPI strip ─ */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--border);
  background: var(--bg1);
}

.kpi-tile {
  padding: 16px 22px;
  border-right: 1px solid var(--border);
  animation: slidein .3s ease both;
}
.kpi-tile:last-child { border-right: 0; }
.kpi-tile:nth-child(2) { animation-delay: .05s; }
.kpi-tile:nth-child(3) { animation-delay: .10s; }
.kpi-tile:nth-child(4) { animation-delay: .15s; }

.kpi-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.kpi-value {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
  margin-bottom: 4px;
}
.kpi-value.teal  { color: var(--teal); }
.kpi-value.amber { color: var(--amber); }
.kpi-value.red   { color: var(--red); }
.kpi-value.blue  { color: var(--blue); }

.kpi-foot {
  font-size: 12px;
  color: var(--dim);
}

/*  Full layout with KPI strip  */
.page {
  display: grid;
  grid-template-rows: auto 1fr;
  height: calc(100vh - 56px);
  overflow: hidden;
}

.body-grid {
  display: grid;
  grid-template-columns: 340px 1fr 360px;
  overflow: hidden;
  height: 100%;
}

/*  Service cards (left col)  */
.services-col {
  overflow-y: auto;
  border-right: 1px solid var(--border);
}

.col-hd {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}

.col-hd-title { font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.count-badge { font-family: var(--mono); font-size: 11px; color: var(--dim); background: var(--bg3); padding: 2px 8px; border-radius: 10px; }

.service-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

.service-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  text-align: left;
  width: 100%;
  animation: slidein .25s ease both;
  position: relative;
  overflow: hidden;
}
.service-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
  background: var(--dim);
  transition: background .15s;
}
.service-card.ok::before     { background: var(--teal); }
.service-card.watch::before  { background: var(--blue); }
.service-card.pressure::before { background: var(--amber); }
.service-card.overloaded::before { background: var(--red); }

.service-card:hover { border-color: var(--border2); background: var(--bg3); }
.service-card.active { border-color: var(--border2); background: var(--bg3); }

.sc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.sc-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
.sc-id   { font-size: 11px; font-family: var(--mono); color: var(--dim); margin-top: 2px; }

.sc-pill {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  flex-shrink: 0;
}
.sc-pill.ok       { background: var(--teal-dim); color: var(--teal); border: 1px solid var(--teal-bd); }
.sc-pill.watch    { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue-bd); }
.sc-pill.pressure { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-bd); }
.sc-pill.overloaded { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-bd); }

.sc-sentence {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.45;
  margin-bottom: 10px;
}
.sc-sentence strong { color: var(--text); font-weight: 500; }

.sc-bar-wrap { margin-bottom: 6px; }
.sc-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); margin-bottom: 4px; }
.sc-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.sc-bar-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.sc-bar-fill.ok       { background: var(--teal); }
.sc-bar-fill.watch    { background: var(--blue); }
.sc-bar-fill.pressure { background: var(--amber); }
.sc-bar-fill.overloaded { background: var(--red); }

.sc-stats { display: flex; gap: 14px; }
.sc-stat { }
.sc-stat-val { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }
.sc-stat-key { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }

/*  Middle col — command + analysis  */
.middle-col {
  overflow-y: auto;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

/*  Selected service detail ─ */
.detail-header {
  padding: 20px 24px 18px;
  border-bottom: 1px solid var(--border);
  animation: slidein .2s ease;
}

.detail-name { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.detail-id   { font-family: var(--mono); font-size: 12px; color: var(--dim); margin-bottom: 14px; }

.detail-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}

.dm-cell {
  background: var(--bg2);
  padding: 12px 14px;
}
.dm-val { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--text); }
.dm-val.teal  { color: var(--teal); }
.dm-val.amber { color: var(--amber); }
.dm-val.red   { color: var(--red); }
.dm-key { font-size: 11px; color: var(--muted); margin-top: 2px; }

.detail-sentence {
  font-size: 14px;
  line-height: 1.6;
  color: var(--muted);
  padding: 12px 14px;
  background: var(--bg2);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.detail-sentence strong { color: var(--text); }

/*  Actions strip ─ */
.actions-strip {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text);
  transition: all .15s;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn:not(:disabled):hover { border-color: var(--border2); background: var(--bg3); }

.btn.primary {
  background: var(--teal);
  border-color: var(--teal);
  color: #000;
  font-weight: 600;
}
.btn.primary:not(:disabled):hover { filter: brightness(1.1); }

.btn.danger {
  border-color: var(--amber-bd);
  background: var(--amber-dim);
  color: var(--amber);
}
.btn.danger:not(:disabled):hover { border-color: var(--amber); }

.btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.btn.primary svg { stroke: #000; }

.spinner { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,.2); border-top-color: #000; border-radius: 50%; animation: spin 700ms linear infinite; flex-shrink: 0; }
.spinner.light { border-color: rgba(255,255,255,.15); border-top-color: var(--muted); }

/*  Pipeline track  */
.pipeline-track {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0;
}

.pt-step {
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 0;
}

.pt-node {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--dim);
  flex-shrink: 0;
  transition: all .2s;
  position: relative;
  z-index: 1;
}
.pt-node.done   { background: var(--teal); border-color: var(--teal); color: #000; }
.pt-node.active { background: var(--bg3); border-color: var(--teal); color: var(--teal); animation: pulse 1s ease-in-out infinite; }

.pt-line { flex: 1; height: 1.5px; background: var(--border2); transition: background .2s; }
.pt-line.done { background: var(--teal); }

.pt-labels {
  display: flex;
  padding: 6px 24px 0;
  gap: 0;
}
.pt-label {
  flex: 1;
  font-size: 10px;
  color: var(--dim);
  text-align: center;
  transition: color .2s;
  line-height: 1.3;
}
.pt-label.active { color: var(--teal); }
.pt-label.done   { color: var(--muted); }

/*  Analysis result ─ */
.result-area {
  flex: 1;
  padding: 20px 24px;
  animation: slidein .25s ease;
}

.result-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  height: 200px;
  color: var(--muted);
}
.result-empty .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: .4; }
.result-empty h3 { font-size: 15px; color: var(--text); margin-bottom: 6px; }
.result-empty p  { font-size: 13px; max-width: 300px; line-height: 1.6; }

.result-story {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 14px;
}
.result-verdict {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.verdict-pill {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}
.verdict-pill.ok   { background: var(--teal-dim); color: var(--teal); border: 1px solid var(--teal-bd); }
.verdict-pill.warn { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-bd); }
.verdict-pill.bad  { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-bd); }

.result-headline {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 10px;
}
.result-headline span { color: var(--teal); }

.result-body {
  font-size: 14px;
  line-height: 1.7;
  color: var(--muted);
}
.result-body strong { color: var(--text); font-weight: 500; }

.result-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 16px;
}

.rstat {
  background: var(--bg3);
  border-radius: 8px;
  padding: 12px;
}
.rstat-val { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text); }
.rstat-key { font-size: 11px; color: var(--dim); margin-top: 2px; }

/*  Impact list ─ */
.impact-section { margin-bottom: 14px; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: .10em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }

.impact-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.impact-row:last-child { border-bottom: 0; }

.impact-name { font-size: 13px; color: var(--text); font-weight: 500; min-width: 110px; }
.impact-bar-wrap { flex: 1; }
.impact-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.impact-bar-fill { height: 100%; border-radius: 3px; background: var(--teal); opacity: .8; transition: width .4s ease; }
.impact-score { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 44px; text-align: right; }

/*  Error / safety blocked  */
.alert-box {
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.55;
  margin-bottom: 12px;
}
.alert-box.err  { background: var(--red-dim); border: 1px solid var(--red-bd); color: var(--red); }
.alert-box.warn { background: var(--amber-dim); border: 1px solid var(--amber-bd); color: var(--amber); }
.alert-box.info { background: var(--blue-dim); border: 1px solid var(--blue-bd); color: var(--blue); }
.alert-box strong { font-weight: 600; }

/*  Right col — actions + settings ─ */
.right-col {
  overflow-y: auto;
}

/*  Action policy section ─ */
.r-section {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}

.r-section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .10em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.action-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 14px;
  margin-bottom: 8px;
  animation: slidein .2s ease both;
}
.ac-rank { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.ac-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.ac-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.ac-bar  { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; margin-top: 10px; }
.ac-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), #0095CC); border-radius: 2px; }

/*  History ─ */
.history-list { display: flex; flex-direction: column; gap: 6px; }
.history-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  background: var(--bg2);
  border-radius: 7px;
  border: 1px solid var(--border);
}
.hi-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.hi-dot.ok   { background: var(--teal); }
.hi-dot.warn { background: var(--amber); }
.hi-dot.bad  { background: var(--red); }
.hi-body { flex: 1; min-width: 0; }
.hi-root { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hi-meta { font-size: 11px; color: var(--dim); }

/*  API key field ─ */
.field-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.field-input {
  width: 100%;
  padding: 9px 12px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
  transition: border-color .15s;
}
.field-input:focus { border-color: var(--teal-bd); }
.field-input::placeholder { color: var(--dim); }

/*  Empty states  */
.empty-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  color: var(--muted);
  height: 100%;
}
.empty-col h3 { font-size: 15px; color: var(--text); margin: 12px 0 6px; }
.empty-col p  { font-size: 13px; line-height: 1.65; max-width: 260px; }

.empty-icon-lg {
  width: 52px; height: 52px;
  border-radius: 14px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: center;
}
.empty-icon-lg svg { width: 24px; height: 24px; fill: none; stroke: var(--dim); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/*  Node select dropdown  */
.node-select {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  cursor: pointer;
  margin-bottom: 12px;
}

/*  Responsive  */
@media (max-width: 1100px) {
  .body-grid { grid-template-columns: 300px 1fr; }
  .right-col { display: none; }
  .kpi-strip { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 720px) {
  .body-grid { grid-template-columns: 1fr; }
  .services-col { display: none; }
  .kpi-strip { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  "use strict";

  /*  State ─ */
  var S = {
    health:      null,
    nodes:       [],
    selected:    "",
    result:      null,   // merged output from /analyze + /act
    error:       "",
    busy:        "",
    phase:       -1,
    lastUpdated: null,
    apiError:    false,
    apiKey:      localStorage.getItem("absia_api_key") || "",
    history:     readJSON("absia_history", [])
  };

  var phaseTimer   = null;
  var refreshTimer = null;

  /*  Pipeline phase labels (human, not technical)  */
  var PHASES = [
    { short: "Traffic",  long: "Reading traffic patterns" },
    { short: "Patterns", long: "Detecting anomalies"      },
    { short: "Causes",   long: "Mapping cause & effect"   },
    { short: "Evidence", long: "Building explanation"     },
    { short: "Decision", long: "Safety check & ranking"   }
  ];

  /*  Plain-English helpers ─ */
  function friendlyName(id) {
    var v = String(id || "service");
    var l = v.toLowerCase();
    if (/^db$|database|postgres|mysql|mongo|redis|dynamo|cassandra/.test(l)) return "Database";
    if (/auth|identity|login|session|oauth|jwt/.test(l))                      return "Auth Service";
    if (/gateway|edge|ingress|proxy|nginx|haproxy|traefik|lb/.test(l))        return "API Gateway";
    if (/cache|memcache/.test(l))                                             return "Cache Layer";
    if (/queue|kafka|rabbit|rmq|worker|job|celery|sidekiq/.test(l))           return "Queue Worker";
    if (/search|elastic|solr/.test(l))                                        return "Search Service";
    if (/mailer|email|smtp|sendgrid/.test(l))                                 return "Mail Service";
    if (/payment|stripe|billing/.test(l))                                     return "Payment Service";
    return v.replace(/[-_:.]+/g, " ").replace(/\b\w/g, function(c){ return c.toUpperCase(); });
  }

  function statusKey(node) {
    var s = node && node.status ? node.status : "healthy";
    if (s === "healthy")    return { key: "ok",         label: "Healthy",      score: 0 };
    if (s === "watch")      return { key: "watch",      label: "Watch",        score: 1 };
    if (s === "pressure")   return { key: "pressure",   label: "High load",    score: 2 };
    return                         { key: "overloaded", label: "Overloaded",   score: 3 };
  }

  function sentenceForNode(node) {
    if (!node) return "";
    var load    = node.load || 0;
    var qlen    = Math.round(node.queue_length || 0);
    var arrival = Math.round(node.arrival_rate || 0);
    var cap     = Math.round(node.service_rate || 0);
    var name    = friendlyName(node.node_id);
    var s       = statusKey(node);

    if (s.key === "ok")
      return "Handling traffic well — processing " + arrival + " req/s with capacity to spare.";
    if (s.key === "watch")
      return "Running at " + Math.round(load * 100) + "% of capacity. Worth monitoring but not critical.";
    if (s.key === "pressure")
      return "Under pressure. Receiving " + arrival + " req/s but capacity is " + cap + ". " + (qlen > 0 ? qlen + " requests waiting." : "");
    return "Can't keep up with demand. " + arrival + " req/s in, only " + cap + " capacity. " + (qlen > 0 ? qlen + " requests stuck in queue." : "Backlog growing.");
  }

  function confMeta(result) {
    var r  = result || {};
    var cs = r.confidence_state || "UNKNOWN";
    if (cs === "CONFIRMED") return { key: "ok",   label: "High confidence" };
    if (cs === "PROBABLE")  return { key: "warn", label: "Probable"        };
    return                         { key: "bad",  label: "Not confident"   };
  }

  function analysisHeadline(result) {
    if (!result) return "";
    var root  = result.root_cause || result.physics_root_cause;
    var name  = root ? friendlyName(root) : null;
    var cs    = (result.confidence_state || "UNKNOWN");
    if (!name) return "No clear root cause found";
    if (cs === "CONFIRMED") return name + " is causing the problem";
    if (cs === "PROBABLE")  return name + " is the likely cause";
    return "Root cause unclear — more data needed";
  }

  function analysisStory(result) {
    if (!result) return "";
    var root  = result.root_cause || result.physics_root_cause;
    var name  = root ? friendlyName(root) : null;
    var score = Math.round((result.confidence_score || 0) * 100);
    var risk  = result.latent_risk || "UNKNOWN";
    var node  = S.nodes.find(function(n){ return n.node_id === root; });
    var cs    = result.confidence_state || "UNKNOWN";

    if (!name) {
      return "ABSIA ran the full analysis but couldn't find a stable root cause. This usually means more data is needed — wait for at least 4 metric samples per service, then run again.";
    }

    var parts = [];

    if (cs === "CONFIRMED") {
      parts.push("<strong>" + name + "</strong> is the most likely source of the incident with " + score + "% confidence.");
    } else if (cs === "PROBABLE") {
      parts.push("<strong>" + name + "</strong> is the probable source of the incident (" + score + "% confidence), but certainty isn't high enough for automated action.");
    } else {
      parts.push("The analysis completed but confidence is too low to name a cause safely. ABSIA will not guess.");
    }

    if (node) {
      var arr = Math.round(node.arrival_rate || 0);
      var cap = Math.round(node.service_rate || 0);
      if (arr > 0 && cap > 0) {
        if (arr > cap) {
          parts.push("It's receiving <strong>" + arr + " req/s</strong> but can only handle <strong>" + cap + " req/s</strong> — " + Math.round(((arr-cap)/cap)*100) + "% over capacity.");
        } else {
          parts.push("It's currently processing <strong>" + arr + " req/s</strong> against a capacity of <strong>" + cap + " req/s</strong>.");
        }
      }
    }

    if (risk === "HIGH") {
      parts.push("A <strong>hidden cause</strong> is suspected — something upstream may not be visible in current metrics.");
    } else if (risk === "MEDIUM") {
      parts.push("Moderate risk of a hidden dependency contributing to this issue.");
    }

    var fb = result.fallback_triggered;
    if (fb) {
      parts.push("The safety gate <strong>blocked automated action</strong> — confidence isn't high enough to recommend changes automatically.");
    }

    return parts.join(" ");
  }

  /*  Utilities ─ */
  function esc(v) {
    return String(v == null ? "" : v)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }
  function fmt(v, d) {
    if (v == null || !isFinite(v)) return "—";
    return Number(v).toLocaleString(undefined, { maximumFractionDigits: d == null ? 1 : d });
  }
  function pct(v)   { return isFinite(v) ? Math.round(v * 100) + "%" : "—"; }
  function clamp(v) { return Math.min(100, Math.max(0, Math.round((v || 0) * 100))); }
  function reltime(iso) {
    if (!iso) return "—";
    var s = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 1000));
    if (s < 60)    return "just now";
    if (s < 3600)  return Math.round(s/60) + "m ago";
    if (s < 86400) return Math.round(s/3600) + "h ago";
    return Math.round(s/86400) + "d ago";
  }
  function readJSON(k, fb) { try { var r=localStorage.getItem(k); return r?JSON.parse(r):fb; } catch(e){ return fb; } }
  function writeJSON(k,v)  { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){} }

  /*  SVG icons ─ */
  var ICONS = {
    refresh:  '<polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>',
    search:   '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>',
    shield:   '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>',
    play:     '<polygon points="5 3 19 12 5 21 5 3"></polygon>',
    zap:      '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>',
    info:     '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>',
    check:    '<polyline points="20 6 9 17 4 12"></polyline>',
    server:   '<rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/>',
    activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>',
    clock:    '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>',
    key:      '<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>',
    grid:     '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
    alert:    '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>'
  };
  function icon(name, cls) {
    return '<svg class="' + (cls||"icon-svg") + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + (ICONS[name]||"") + '</svg>';
  }

  /*  API ─ */
  function apiGet(path) {
    return fetch(path, { headers:{ Accept:"application/json" } })
      .then(function(r){ return r.json().then(function(j){ j.__st=r.status; return j; }).catch(function(){ return {__st:r.status,errors:["Bad JSON"]}; }); })
      .catch(function(){ return {__st:0,errors:["Network error"]}; });
  }
  function apiPost(path, body, token) {
    var h = { "Content-Type":"application/json", Accept:"application/json" };
    if (token) h.Authorization = "Bearer " + token;
    return fetch(path,{ method:"POST", headers:h, body:JSON.stringify(body) })
      .then(function(r){ return r.json().then(function(j){ j.__st=r.status; return j; }); });
  }

  /*  Sorting ─ */
  function sorted() {
    return S.nodes.slice().sort(function(a,b){
      var d = statusKey(b).score - statusKey(a).score;
      return d !== 0 ? d : (b.load||0) - (a.load||0);
    });
  }
  function selNode() { return S.nodes.find(function(n){ return n.node_id===S.selected; })||null; }
  function bestNode(ns) {
    if (!ns.length) return "";
    return ns.slice().sort(function(a,b){
      var d = statusKey(b).score - statusKey(a).score;
      return d !== 0 ? d : (b.load||0) - (a.load||0);
    })[0].node_id;
  }
  function bodyForSel() {
    var n = selNode(); if (!n) return null;
    return { node_id:n.node_id, arrival_rate:n.arrival_rate, service_rate:Math.max(n.service_rate,1), queue_length:n.queue_length };
  }

  /*  Busy / phase animation  */
  function startBusy(mode) {
    stopBusy(false);
    S.busy=mode; S.error=""; S.phase=0;
    var i=0;
    phaseTimer = setInterval(function(){ i=Math.min(i+1,PHASES.length-1); S.phase=i; render(); }, 550);
    render();
  }  function stopBusy(doRender) {
    if (phaseTimer) clearInterval(phaseTimer);
    phaseTimer=null; S.busy=""; S.phase=-1;
    if (doRender) render();
  }

  function remember(result, kind) {
    var root = result.root_cause || result.physics_root_cause || (selNode()&&selNode().node_id) || "unknown";
    var cs   = result.confidence_state || "UNKNOWN";
    var item = { time:new Date().toISOString(), kind:kind, root:root, state:cs, score:result.confidence_score||0 };
    S.history = [item].concat(S.history).slice(0,6);
    writeJSON("absia_history", S.history);
  }

  /*  Data fetching ─ */
  async function refresh() {
    try {
      var [health, nodes] = await Promise.all([apiGet("/health"), apiGet("/nodes")]);
      S.health = (health && !health.errors) ? health : null;
      if (nodes && nodes.__st === 200 && Array.isArray(nodes.nodes)) {
        S.nodes = nodes.nodes;
      } else {
        S.nodes = [];
      }
      if (!S.selected || !S.nodes.some(function(n){ return n.node_id===S.selected; }))
        S.selected = bestNode(S.nodes);
      S.lastUpdated = new Date();
      S.apiError = false;
      render();
    } catch(e) {
      S.nodes = [];
      S.apiError = true;
      S.lastUpdated = new Date();
      render();
    }
  }

  // One function. Hits /analyze and /act in parallel (same pipeline, different
  // response slices). Merges everything into S.result and renders once.
  async function runDiagnose() {
    var body = bodyForSel();
    if (!body) { S.error = "Select a service first."; render(); return; }
    startBusy("diagnose");
    S.result = null; S.error = "";
    try {
      // /analyze and /act run the same 5-phase pipeline server-side.
      // Fire both in parallel so the user waits for only one round-trip worth of time.
      var [analysis, act] = await Promise.all([
        apiPost("/analyze", body),
        apiPost("/act",     body, S.apiKey)
      ]);
      stopBusy(false);
      if (analysis.success === false) {
        S.error = (analysis.errors && analysis.errors[0]) || "Analysis failed.";
      } else {
        // Merge: analysis carries root-cause + evidence; act carries ranked actions.
        // If act was blocked by the safety gate that fact is preserved in act.success===false.
        S.result = Object.assign({}, analysis, { act: act });
        S.error  = "";
        remember(analysis, "diagnose");
      }
      render();
    } catch(e) {
      stopBusy(false);
      S.error = "Could not reach the API. Check the container is running.";
      render();
    }
  }

  /*  Render helpers  */
  function renderHeader() {
    var online = S.health && S.health.status==="ok";
    var real   = S.health && S.health.real_data_available;
    var last   = S.lastUpdated ? S.lastUpdated.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "—";
    return [
      '<header class="header">',
        '<div class="logo">',
          '<div class="logo-mark">AB</div>',
          '<div>',
            '<div class="logo-text">ABSIA</div>',
            '<div class="logo-tag">Causal Intelligence Engine</div>',
          '</div>',
        '</div>',
        '<div class="header-sep"></div>',
        '<div class="status-row">',
          online
            ? '<span class="badge live"><span class="live-dot"></span>Live</span>'
            : '<span class="badge dead">Offline</span>',
          (online && real) ? '<span class="badge live">' + S.nodes.length + ' service' + (S.nodes.length===1?'':'s') + ' monitored</span>' : '',
          '<span class="badge"><svg style="width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>&nbsp;' + esc(last) + '</span>',
          '<button class="icon-btn" data-action="refresh" title="Refresh">' + icon("refresh") + '</button>',
        '</div>',
      '</header>'
    ].join("");
  }

  function renderKpis() {
    var ns    = S.nodes;
    var total = ns.length;
    var hot   = ns.filter(function(n){ return statusKey(n).score >= 2; }).length;
    var ready = ns.filter(function(n){ return n.pipeline_ready; }).length;
    var r     = S.result;
    var conf  = r ? confMeta(r) : null;
    var root  = r && (r.root_cause || r.physics_root_cause);

    return [
      '<div class="kpi-strip">',
        kpiTile("Services watched", total ? String(total) : "—", total ? ready + " pipeline-ready" : "Waiting for services", total ? "teal" : ""),
        kpiTile("Under pressure",   total ? String(hot)   : "—", total ? (hot ? "need attention" : "all clear") : "No data yet", total ? (hot ? "amber" : "teal") : ""),
        kpiTile("Safety gate",  conf ? conf.label : "—", r ? pct(r.confidence_score||0)+" confidence" : "Run a diagnosis first", conf ? conf.key==="ok"?"teal":conf.key==="warn"?"amber":"red" : ""),
        kpiTile("Root cause",   root ? friendlyName(root) : "—", root ? root : "No diagnosis run yet", root ? "blue" : ""),
      '</div>'
    ].join("");
  }

  function kpiTile(label, value, foot, color) {
    var cls = color && {teal:"teal",amber:"amber",red:"red",blue:"blue",ok:"teal"}[color] || "";
    return [
      '<div class="kpi-tile">',
        '<div class="kpi-label">' + esc(label) + '</div>',
        '<div class="kpi-value ' + cls + '">' + esc(value) + '</div>',
        '<div class="kpi-foot">' + esc(foot) + '</div>',
      '</div>'
    ].join("");
  }

  function renderServicesCol() {
    var ns = sorted();
    return [
      '<div class="services-col">',
        '<div class="col-hd">',
          '<span class="col-hd-title">Your Services</span>',
          '<span class="count-badge">' + ns.length + '</span>',
        '</div>',
        '<div class="service-list">',
          ns.length ? ns.map(renderServiceCard).join("") : renderEmptyServices(),
        '</div>',
      '</div>'
    ].join("");
  }

  function renderServiceCard(node) {
    var meta  = statusKey(node);
    var w     = clamp(node.load || 0);
    var name  = friendlyName(node.node_id);
    var sent  = sentenceForNode(node);
    var isAct = node.node_id === S.selected;

    return [
      '<button class="service-card ' + meta.key + (isAct?" active":"") + '" data-select="' + esc(node.node_id) + '">',
        '<div class="sc-top">',
          '<div>',
            '<div class="sc-name">' + esc(name) + '</div>',
            '<div class="sc-id">' + esc(node.node_id) + '</div>',
          '</div>',
          '<span class="sc-pill ' + meta.key + '">' + esc(meta.label) + '</span>',
        '</div>',
        '<div class="sc-sentence">' + esc(sent) + '</div>',
        '<div class="sc-bar-wrap">',
          '<div class="sc-bar-label">',
            '<span>Capacity used</span>',
            '<span>' + pct(node.load||0) + '</span>',
          '</div>',
          '<div class="sc-bar"><div class="sc-bar-fill ' + meta.key + '" style="width:' + w + '%"></div></div>',
        '</div>',
        '<div class="sc-stats">',
          '<div class="sc-stat"><div class="sc-stat-val">' + fmt(node.arrival_rate,0) + '</div><div class="sc-stat-key">In</div></div>',
          '<div class="sc-stat"><div class="sc-stat-val">' + fmt(node.service_rate,0) + '</div><div class="sc-stat-key">Capacity</div></div>',
          '<div class="sc-stat"><div class="sc-stat-val">' + fmt(node.queue_length,0) + '</div><div class="sc-stat-key">Queued</div></div>',
          '<div class="sc-stat"><div class="sc-stat-val">' + fmt(node.sample_count,0) + '</div><div class="sc-stat-key">Samples</div></div>',
        '</div>',
      '</button>'
    ].join("");
  }

  function renderEmptyServices() {
    if (S.apiError) {
      return [
        '<div class="empty-col">',
          '<div class="empty-icon-lg">' + icon("alert") + '</div>',
          '<h3>Cannot reach ABSIA</h3>',
          '<p>The API is not responding. Check that the container is running and port 8080 is reachable.</p>',
        '</div>'
      ].join("");
    }
    return [
      '<div class="empty-col">',
        '<div class="empty-icon-lg">' + icon("server") + '</div>',
        '<h3>No services detected</h3>',
        '<p>ABSIA is running and watching for containers. Start your other services and they will appear here automatically.</p>',
      '</div>'
    ].join("");
  }

  function renderMiddleCol() {
    var node = selNode();
    return [
      '<div class="middle-col">',
        node ? renderDetailHeader(node) : renderNoSelection(),
        renderActionsStrip(node),
        renderPipelineTrack(),
        '<div class="result-area">',
          S.error ? '<div class="alert-box err">' + icon("alert") + ' ' + esc(S.error) + '</div>' : '',
          S.result ? renderFullResult() : (S.busy ? "" : renderResultPlaceholder()),
        '</div>',
      '</div>'
    ].join("");
  }

  function renderNoSelection() {
    if (S.apiError) {
      return [
        '<div style="padding:20px 24px;border-bottom:1px solid var(--border);">',
          '<div class="alert-box err" style="margin:0">' + icon("alert") + ' ABSIA API is not reachable. Ensure the container is running on port 8080.</div>',
        '</div>'
      ].join("");
    }
    if (!S.nodes.length) {
      return [
        '<div style="padding:20px 24px;border-bottom:1px solid var(--border);">',
          '<div style="color:var(--muted);font-size:13px;line-height:1.6">',
            'Waiting for containers to appear. This usually takes less than 30 seconds after your other services start.',
          '</div>',
        '</div>'
      ].join("");
    }
    return [
      '<div style="padding:20px 24px;border-bottom:1px solid var(--border);">',
        '<div style="color:var(--muted);font-size:13px;">Select a service from the left to begin analysis.</div>',
      '</div>'
    ].join("");
  }

  function renderDetailHeader(node) {
    var meta = statusKey(node);
    var load = node.load || 0;
    var over = load > 1 ? Math.round((load-1)*100)+"% over capacity" : Math.round(load*100)+"% of capacity";

    return [
      '<div class="detail-header">',
        '<div class="detail-name">' + esc(friendlyName(node.node_id)) + '</div>',
        '<div class="detail-id">' + esc(node.node_id) + '  ·  sampled ' + esc(reltime(node.last_seen)) + '</div>',
        '<div class="detail-metrics">',
          '<div class="dm-cell">',
            '<div class="dm-val ' + (load >= 1 ? "red" : load >= 0.85 ? "amber" : "teal") + '">' + pct(load) + '</div>',
            '<div class="dm-key">' + esc(over) + '</div>',
          '</div>',
          '<div class="dm-cell">',
            '<div class="dm-val">' + fmt(node.arrival_rate,0) + '</div>',
            '<div class="dm-key">Incoming req/s</div>',
          '</div>',
          '<div class="dm-cell">',
            '<div class="dm-val">' + fmt(node.service_rate,0) + '</div>',
            '<div class="dm-key">Processing capacity</div>',
          '</div>',
        '</div>',
        '<div class="detail-sentence">' + esc(sentenceForNode(node)) + '</div>',
      '</div>'
    ].join("");
  }

  function renderActionsStrip(node) {
    var dis = S.busy || !node ? "disabled" : "";
    var spin = S.busy ? '<span class="spinner"></span>' : icon("play");
    return [
      '<div class="actions-strip">',
        '<select class="node-select" id="nodeSelect">',
          S.nodes.length
            ? S.nodes.map(function(n){ return '<option value="' + esc(n.node_id) + '"' + (n.node_id===S.selected?" selected":"") + '>' + esc(friendlyName(n.node_id)) + ' (' + esc(n.node_id) + ')</option>'; }).join("")
            : '<option>No services yet</option>',
        '</select>',
        '<button class="btn primary" data-action="diagnose" ' + dis + '>' + spin + '<span>' + (S.busy ? "Running analysis…" : "Run Diagnosis") + '</span></button>',
      '</div>'
    ].join("");
  }

  function renderPipelineTrack() {
    if (!S.busy && S.phase === -1 && !S.result) return "";
    var done_all = S.result && !S.busy;
    var parts = ['<div class="pipeline-track">'];
    PHASES.forEach(function(p, i) {
      var done   = done_all || (S.busy && i < S.phase);
      var active = S.busy && i === S.phase;
      var cls    = done ? "done" : active ? "active" : "";
      parts.push('<div class="pt-step">');
      parts.push('<div class="pt-node ' + cls + '">' + (done ? icon("check","icon-svg") : (i+1)) + '</div>');
      if (i < PHASES.length - 1) parts.push('<div class="pt-line ' + (done?"done":"") + '"></div>');
      parts.push('</div>');
    });
    parts.push('</div>');
    parts.push('<div class="pt-labels">');
    PHASES.forEach(function(p, i) {
      var done   = done_all || (S.busy && i < S.phase);
      var active = S.busy && i === S.phase;
      var cls    = done ? "done" : active ? "active" : "";
      parts.push('<div class="pt-label ' + cls + '">' + esc(active ? p.long : p.short) + '</div>');
    });
    parts.push('</div>');
    return parts.join("");
  }

  function renderResultPlaceholder() {
    return [
      '<div class="result-empty">',
        '<div class="empty-icon-lg" style="margin:0 auto 14px">' + icon("activity") + '</div>',
        '<h3>Ready</h3>',
        '<p>Select a service and click <strong>Run Diagnosis</strong>. ABSIA will identify the root cause and tell you what to do.</p>',
      '</div>'
    ].join("");
  }

  function renderFallbackWarning(safety) {
    if (!safety) return "";
    var reasons = safety.fallback_reasons || [];
    var probes  = safety.probe_nodes || safety.probe_recommendations || [];
    if (!reasons.length && !probes.length) return "";
    return [
      '<div class="alert-box warn">',
        reasons.length ? '<strong>Why confidence is low:</strong> ' + esc(reasons.join(", ")) + (probes.length?"<br>":"") : "",
        probes.length ? '<strong>Investigate next:</strong> ' + esc(probes.join(", ")) : "",
      '</div>'
    ].join("");
  }
  // Three sections: root cause story → evidence chain → recommended actions.
  function renderFullResult() {
    var r    = S.result;
    var act  = r.act || {};
    var meta = confMeta(r);
    var root = r.root_cause || r.physics_root_cause;

    var effects = r.backdoor_effects || r.causes || {};
    var effectEntries = Object.keys(effects)
      .map(function(k){ return [k, Number(effects[k])||0]; })
      .sort(function(a,b){ return Math.abs(b[1])-Math.abs(a[1]); })
      .slice(0,5);
    var maxE = effectEntries.length
      ? Math.max.apply(null, effectEntries.map(function(e){ return Math.abs(e[1]); }))
      : 1;

    //  Section 1: Root cause story 
    var s1 = [
      '<div class="result-story">',
        '<div class="result-verdict">',
          '<span class="verdict-pill ' + meta.key + '">' + esc(meta.label) + '</span>',
          '<span style="font-size:12px;color:var(--dim)">' + fmt(r.execution_time_ms,0) + ' ms</span>',
        '</div>',
        '<div class="result-headline">' + esc(analysisHeadline(r)) + '</div>',
        '<div class="result-body">' + analysisStory(r) + '</div>',
        '<div class="result-stats">',
          '<div class="rstat"><div class="rstat-val">' + pct(r.confidence_score||0) + '</div><div class="rstat-key">Confidence</div></div>',
          '<div class="rstat"><div class="rstat-val">' + esc(r.latent_risk||"—") + '</div><div class="rstat-key">Hidden risk</div></div>',
          '<div class="rstat"><div class="rstat-val">' + (r.patterns_detected||r.patterns_count||0) + '</div><div class="rstat-key">Anomalies</div></div>',
        '</div>',
      '</div>'
    ].join("");

    //  Section 2: Evidence — what's being impacted 
    var s2 = effectEntries.length ? [
      '<div class="impact-section">',
        '<div class="section-label">What\'s being impacted</div>',
        effectEntries.map(function(e) {
          var w = Math.max(4, Math.round(Math.abs(e[1]) / maxE * 100));
          return [
            '<div class="impact-row">',
              '<div class="impact-name">' + esc(friendlyName(e[0])) + '</div>',
              '<div class="impact-bar-wrap"><div class="impact-bar"><div class="impact-bar-fill" style="width:' + w + '%"></div></div></div>',
              '<div class="impact-score">' + fmt(e[1],3) + '</div>',
            '</div>'
          ].join("");
        }).join(""),
      '</div>'
    ].join("") : "";

    //  Section 3: Actions (or safety gate block) 
    var s3 = "";
    if (act.success === false) {
      s3 = [
        '<div class="alert-box warn">',
          icon("shield") + ' <strong>No actions recommended.</strong> Confidence is too low to suggest changes safely. Collect more data and run again.',
        '</div>'
      ].join("");
    } else {
      var acts = act.recommended_actions || act.actions || [];
      if (acts.length) {
        s3 = [
          '<div class="impact-section">',
            '<div class="section-label">What to do about it</div>',
            acts.slice(0,3).map(function(a, i) {
              var keys = Object.keys(a.interventions || {});
              var label = keys.length
                ? keys.map(function(k){ return friendlyName(k) + " → " + fmt(a.interventions[k],2); }).join(", ")
                : "Adjust " + friendlyName(S.selected);
              var score = Math.round((a.policy_score||0)*100);
              return [
                '<div class="action-card" style="animation-delay:' + (i*.06) + 's">',
                  '<div class="ac-rank">Option ' + (i+1) + (score ? '  ·  ' + score + '% confidence' : '') + '</div>',
                  '<div class="ac-name">' + esc(label) + '</div>',
                  score ? '<div class="ac-bar"><div class="ac-bar-fill" style="width:' + score + '%"></div></div>' : '',
                '</div>'
              ].join("");
            }).join(""),
          '</div>'
        ].join("");
      }
    }

    //  Fallback reasons 
    var s4 = renderFallbackWarning(r.safety || r);

    return s1 + s2 + s3 + s4;
  }

  function renderRightCol() {
    return [
      '<div class="right-col">',
        /* API key */
        '<div class="r-section">',
          '<div class="r-section-title">Authentication</div>',
          '<div class="field-label">API key for /act endpoint</div>',
          '<input class="field-input" id="apiKey" type="password" autocomplete="off" value="' + esc(S.apiKey) + '" placeholder="Leave empty if auth disabled">',
        '</div>',

        /* History */
        S.history.length ? [
          '<div class="r-section">',
            '<div class="r-section-title">Recent runs</div>',
            '<div class="history-list">',
            S.history.map(function(item) {
              var cm = confMeta({confidence_state:item.state});
              return [
                '<div class="history-item">',
                  '<div class="hi-dot ' + cm.key + '"></div>',
                  '<div class="hi-body">',
                    '<div class="hi-root">' + esc(friendlyName(item.root)) + '</div>',
                    '<div class="hi-meta">' + esc(item.kind) + ' · ' + esc(cm.label) + ' · ' + esc(reltime(item.time)) + '</div>',
                  '</div>',
                '</div>'
              ].join("");
            }).join(""),
            '</div>',
          '</div>'
        ].join("") : "",

        /* What diagnosis does */
        '<div class="r-section">',
          '<div class="r-section-title">What happens when you diagnose</div>',
          '<div style="display:flex;flex-direction:column;gap:10px">',
            helpRow("Root cause", "teal", "Identifies which service is most likely causing the problem and how confident ABSIA is."),
            helpRow("Impact",     "blue", "Shows which other services are being affected and by how much."),
            helpRow("Actions",    "amber", "Recommends what to do. If confidence is too low, this section is withheld — ABSIA never guesses."),
          '</div>',
        '</div>',

        /* Auto-refresh note */
        '<div class="r-section">',
          '<div class="r-section-title">Auto-refresh</div>',
          '<div style="font-size:12px;color:var(--muted);line-height:1.7">',
            'Service metrics update every <strong style="color:var(--text)">15 seconds</strong> automatically. The dashboard refreshes every <strong style="color:var(--text)">10 seconds</strong>. No action needed.',
          '</div>',
        '</div>',
      '</div>'
    ].join("");
  }

  function helpRow(label, color, desc) {
    return [
      '<div style="display:flex;gap:10px;align-items:flex-start">',
        '<span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:1px;',
          color==="teal"  ? 'background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-bd)' :
          color==="amber" ? 'background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-bd)' :
                           'background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-bd)',
        '">' + esc(label) + '</span>',
        '<span style="font-size:12px;color:var(--muted);line-height:1.5">' + esc(desc) + '</span>',
      '</div>'
    ].join("");
  }

  /*  Main render ─ */
  function render() {
    document.getElementById("app").innerHTML = [
      '<div class="shell">',
        renderHeader(),
        '<div class="page">',
          renderKpis(),
          '<div class="body-grid">',
            renderServicesCol(),
            renderMiddleCol(),
            renderRightCol(),
          '</div>',
        '</div>',
      '</div>'
    ].join("");
    bind();
  }

  /*  Event binding ─ */
  function bind() {
    document.querySelectorAll("[data-action]").forEach(function(el) {
      el.addEventListener("click", function() {
        var a = el.getAttribute("data-action");
        if (a==="refresh")  refresh();
        if (a==="diagnose") runDiagnose();
      });
    });
    document.querySelectorAll("[data-select]").forEach(function(el) {
      el.addEventListener("click", function() {
        S.selected = el.getAttribute("data-select");
        S.result=null; S.error="";
        render();
      });
    });
    var sel = document.getElementById("nodeSelect");
    if (sel) sel.addEventListener("change", function() {
      S.selected = sel.value;
      S.result=null; S.error="";
      render();
    });
    var key = document.getElementById("apiKey");
    if (key) key.addEventListener("input", function() {
      S.apiKey = key.value;
      localStorage.setItem("absia_api_key", S.apiKey);
    });
  }

  /*  Boot  */
  render();
  refresh();
  refreshTimer = setInterval(refresh, 10000);
  window.addEventListener("beforeunload", function() {
    if (refreshTimer) clearInterval(refreshTimer);
    if (phaseTimer)   clearInterval(phaseTimer);
  });

})();
</script>
</body>
</html>
