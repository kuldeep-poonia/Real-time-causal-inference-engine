


services:
  absia:
    image: absia:latest
    # Build locally instead of using pre-built image:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      #  Required: Docker socket for container autodiscovery 
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #  Optional: persist RL policy weights between restarts 
      # - policy_data:/data/policies
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  #  Add your own services below. ABSIA discovers them automatically 
  # example:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"

# Uncomment to persist RL policy weights across restarts:
# volumes:
#   policy_data: