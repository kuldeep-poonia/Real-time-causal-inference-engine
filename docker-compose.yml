
version: '3.8'
services:
  absia:
    build:
      context: .
      dockerfile: Dockerfile
    image: absia:latest
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      # API key is optional; only needed for /act endpoint
      # ABSIA_API_KEY: "your-optional-api-key"
      ABSIA_POLICY_STORE_PATH: /data/policies
      ABSIA_METRICS_STORE_PATH: /data/metrics
      PORT: "8080"
    volumes:
      - policy_data:/data/policies
      - metrics_data:/data/metrics
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Add your own services below. Example:
  # myservice:
  #   image: your-service-image
  #   ...

volumes:
  policy_data:
  metrics_data:
